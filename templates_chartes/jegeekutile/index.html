<!DOCTYPE html>
<html lang="fr" data-theme="nuit-foret" data-mode="econome">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[NomProjet]</title>
  <link rel="stylesheet" href="src/assets/styles/main.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="flex flex-between mb-lg">
      <div class="flex gap-sm" style="align-items: center;">
        <h1>[NomProjet]</h1>
        <span id="mode-indicator" class="admin-mode-indicator standard">Standard</span>
      </div>
      <div class="flex gap-sm">
        <!-- Toggle Admin/Standard -->
        <div id="admin-toggle" class="admin-toggle" title="Basculer mode Admin">
          <span class="admin-toggle-label">Admin</span>
          <div class="admin-toggle-switch"></div>
        </div>
        <!-- Selecteur Theme -->
        <select id="theme-select" class="btn-secondary">
          <option value="nuit-foret">Nuit Foret</option>
          <option value="terre-ethique">Terre Ethique</option>
          <option value="cryptage-nocturne">Cryptage Nocturne</option>
          <option value="aurore-humaine">Aurore Humaine</option>
          <option value="horizon-progres">Horizon Progres</option>
          <option value="ocean-profond">Ocean Profond</option>
          <option value="magma-digital">Magma Digital</option>
          <option value="glacier-arctique">Glacier Arctique</option>
          <option value="sable-dore">Sable Dore</option>
          <option value="nebula-cosmique">Nebula Cosmique</option>
        </select>
        <!-- Selecteur Mode -->
        <select id="mode-select" class="btn-secondary">
          <option value="hyper-econome">Hyper-econome</option>
          <option value="econome">Econome</option>
          <option value="normal">Normal</option>
          <option value="ultra">Ultra</option>
          <option value="supernova">Supernova</option>
          <option value="quasar">Quasar</option>
        </select>
        <!-- Boutons Admin (visibles en mode admin) -->
        <button id="config-toggle" class="btn btn-secondary admin-only" title="Configuration">Config</button>
        <button id="console-toggle" class="btn btn-secondary admin-only" title="Afficher/Masquer Console">Console</button>
      </div>
    </header>

    <!-- Contenu principal (a personnaliser) -->
    <main id="app-content">
      <!-- Votre contenu ici -->
    </main>
  </div>

  <!-- Footer avec logos -->
  <footer class="app-footer">
    <div class="footer-left">
      <img id="project-logo" src="src/assets/images/logo-projet.png" alt="Logo Projet" class="footer-logo project-logo" style="display: none;" title="[NomProjet]">
    </div>
    <div class="footer-right">
      <span class="copyright">@SérénIA Tech - [DATE_CREATION]</span>
      <img src="src/assets/images/logo-serenia.png" alt="SérénIA Tech" class="footer-logo" title="SérénIA Tech">
    </div>
  </footer>

  <!-- Scripts -->
  <script src="config/theme-config.js"></script>
  <script src="src/utils/logger.js"></script>
  <script src="src/modules/hot-reload.js"></script>
  <script src="src/components/admin-console.js"></script>
  <script src="src/components/admin-config.js"></script>
  <script>
    // Initialisation
    document.addEventListener('DOMContentLoaded', () => {
      // Theme/Mode
      const savedTheme = localStorage.getItem('app-theme') || 'nuit-foret';
      const savedMode = localStorage.getItem('app-mode') || 'econome';
      document.getElementById('theme-select').value = savedTheme;
      document.getElementById('mode-select').value = savedMode;

      // Logger
      Logger.init();
      Logger.log('app', 'Application demarree');

      // Hot Reload
      HotReload.init();

      // Admin Console & Config
      AdminConsole.init();
      AdminConfig.init();

      // Restaurer mode admin
      const isAdmin = localStorage.getItem('app-admin') === 'true';
      if (isAdmin) toggleAdminMode(true);
    });

    // Selecteurs theme/mode
    document.getElementById('theme-select').addEventListener('change', (e) => {
      ThemeConfig.setTheme(e.target.value);
      Logger.log('theme', 'Theme change: ' + e.target.value);
    });

    document.getElementById('mode-select').addEventListener('change', (e) => {
      ThemeConfig.setMode(e.target.value);
      Logger.log('mode', 'Mode change: ' + e.target.value);
    });

    // Toggle Admin Mode
    function toggleAdminMode(force) {
      const toggle = document.getElementById('admin-toggle');
      const indicator = document.getElementById('mode-indicator');
      const isActive = force !== undefined ? force : !toggle.classList.contains('active');

      if (isActive) {
        toggle.classList.add('active');
        document.body.classList.add('admin-mode');
        indicator.textContent = 'Admin';
        indicator.className = 'admin-mode-indicator admin';
        Logger.log('admin', 'Mode admin active');
      } else {
        toggle.classList.remove('active');
        document.body.classList.remove('admin-mode');
        document.body.classList.remove('console-open');
        AdminConsole.hide();
        indicator.textContent = 'Standard';
        indicator.className = 'admin-mode-indicator standard';
        Logger.log('admin', 'Mode standard active');
      }

      localStorage.setItem('app-admin', isActive);
    }

    document.getElementById('admin-toggle').addEventListener('click', () => toggleAdminMode());

    // Toggle Console
    document.getElementById('console-toggle').addEventListener('click', () => {
      AdminConsole.toggle();
      document.body.classList.toggle('console-open', AdminConsole.isVisible);
    });

    // Toggle Config Panel
    document.getElementById('config-toggle').addEventListener('click', () => {
      AdminConfig.toggle();
      Logger.log('config', 'Panneau configuration ' + (AdminConfig.isVisible ? 'ouvert' : 'ferme'));
    });

  </script>
</body>
</html>
